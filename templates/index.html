<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoseWise — Vaccination Scheduler</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header>
        <h1>💉 DoseWise</h1>
        <p>Personalized WHO vaccination schedules for every child</p>
    </header>

    <main>
        <div class="card">
            <h2>Enter Child's Details</h2>
            <p class="subtitle">Fill in the details below to generate a personalized vaccination schedule.</p>

            <form action="/result" method="POST">

                <div class="form-group">
                    <label for="child_name">Child's Name</label>
                    <input type="text" id="child_name" name="child_name" 
                           placeholder="e.g. Priya" required>
                </div>

                <div class="form-group">
                    <label for="age_months">Child's Age (in months)</label>
                    <input type="number" id="age_months" name="age_months" 
                           placeholder="e.g. 14" min="0" max="60" required>
                </div>

                <div class="form-group">
                    <label for="vaccines_received">Vaccines Already Received</label>
                    <input type="text" id="vaccines_received" name="vaccines_received"
                           placeholder="e.g. BCG, OPV-0, Hepatitis B">
                    <small>Leave blank if none. Separate multiple vaccines with commas.</small>
                </div>

                <button type="submit">Generate Schedule →</button>

            </form>
        </div>

        <div class="sdg-badge">
            <span>🌍 Supporting UN SDG 3 — Good Health & Well-being</span>
        </div>
    </main>

</body>
</html>
